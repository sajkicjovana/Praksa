<h1 class="page-title">Messages</h1>
<header class="header">
    <a routerLink="/">Home</a>
    @if(isLogged()){
      @if(isAdmin()){
          <a routerLink="/connections">Connections</a>
          <a routerLink="/routing">Routing</a>
        }
      <a (click)="Logout()">Logout</a>
    }@else {
        <a routerLink="/login">Login</a>
        <a routerLink="/register">Register</a>
    }
</header> 
<div class="container">
  <!-- <app-loading></app-loading> -->
  <div class="top"> 
    @if(!showForm){
      <button class="btnForm" (click)="openForm()">+ New Message</button>
    }
    <mat-slide-toggle
      [(ngModel)]="service.isReal"
      (change)="loadAll()">
      Real messages
    </mat-slide-toggle>
  </div>

    @if(showForm){
      <app-new-message
        [editingItem]="editingItem"
        (close)="closeForm()"
        (saved)="onSaved()">
      </app-new-message>
    }
    <!-- <mat-slide-toggle class="messages-toggle"
      [(ngModel)]="isReal"
      (change)="loadAll()"> Real messages
    </mat-slide-toggle> -->

    <angular-slickgrid 
      gridId="grid"
      [columns]="columns"
      [options]="gridOptions"
      [dataset]="messages"
      (onClick)="onGridClick($event)">
    </angular-slickgrid>
  </div>
